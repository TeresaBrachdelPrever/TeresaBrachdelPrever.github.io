<style>
  :root {
    --gold: #EEAF1B;
    --gold-light: #F9F299;
    --peach: #F4D3B8;
    --amaranth: #822C40;
    --amaranth-dark: #5a1e2b;
    --cream: #FDFAF5;
    --white: #ffffff;
    --text-dark: #1a1a1a;
    --text-mid: #444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .bloom {
    margin-bottom: 20px;
  }
  .name {
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 15px;
    text-transform: uppercase;
    color: var(--amaranth);
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 15px;
    color: var(--text-mid);
    margin-bottom: 40px;
    text-align: center;
    max-width: 320px;
  }
  .links {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .link-card {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--white);
    border: 1px solid rgba(130,44,64,0.12);
    border-radius: 100px;
    padding: 18px 24px;
    text-decoration: none;
    color: var(--text-dark);
    font-weight: 500;
    font-size: 16px;
    text-align: center;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    box-shadow: 0 1px 3px rgba(130,44,64,0.06);
  }
  .link-card:hover {
    transform: translateY(-2px);
    border-color: var(--gold);
    box-shadow: 0 6px 16px rgba(130,44,64,0.10);
  }
  .link-card.primary {
    background: var(--amaranth);
    border-color: var(--amaranth);
    color: var(--white);
    font-weight: 700;
  }
  .link-card.primary:hover {
    background: var(--amaranth-dark);
    border-color: var(--amaranth-dark);
  }
  footer {
    margin-top: 56px;
    font-size: 12px;
    color: var(--text-mid);
    opacity: 0.7;
  }
</style>
</head>
